<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nick Productivity</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { font-size: 13px; }
      html, body {
        width: 100%;
        max-width: 100vw;
        height: 100%;
        overflow-x: hidden;
        overscroll-behavior: none;
        position: fixed;
        left: 0;
        right: 0;
      }
      #root {
        width: 100%;
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
